<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Document Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/static/icon.png" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<header>
  <div class="logo-mark">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>
  <h1>QA Analyzer <span>— Document Q&amp;A</span></h1>
  <button class="dark-toggle" id="dark-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    <span class="dark-toggle-track">
      <span class="dark-toggle-thumb">
        <i data-lucide="sun"  class="toggle-icon toggle-icon-sun"  style="width:12px;height:12px;"></i>
        <i data-lucide="moon" class="toggle-icon toggle-icon-moon" style="width:12px;height:12px;"></i>
      </span>
    </span>
  </button>
</header>

<main>
  <!-- Input panel -->
  <div class="card">
    <div class="card-header">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <h2>Upload Files</h2>
    </div>
    <div class="card-body">
      <div>
        <div class="field-label">Content Document</div>
        <div class="upload-zone" id="doc-zone">
          <input type="file" id="doc-file" accept=".pdf,.json,application/pdf,application/json" />
          <div class="upload-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <span class="upload-label">Drop PDF or JSON here</span>
          <span class="upload-hint">or click to browse</span>
          <div class="file-name" id="doc-name"></div>
        </div>
      </div>

      <div>
        <div class="field-label">Questions File</div>
        <div class="upload-zone" id="q-zone">
          <input type="file" id="q-file" accept=".json,application/json" />
          <div class="upload-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <span class="upload-label">Drop JSON here</span>
          <span class="upload-hint">Array of question strings</span>
          <div class="file-name" id="q-name"></div>
        </div>
      </div>

      <button class="btn-primary" id="submit-btn" disabled>
        <div class="spinner"></div>
        <span class="btn-text">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:6px;">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Analyze Document
        </span>
      </button>
    </div>
  </div>

  <!-- Output panel -->
  <div class="card output-panel" id="output-card">
    <div class="output-header">
      <div class="output-header-left">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h2>Results</h2>
      </div>
      <span class="result-count" id="result-count" style="display:none"></span>
    </div>
    <div id="output-body">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <p>No results yet</p>
        <span>Upload a document and questions file, then click Analyze.</span>
      </div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script src="/static/app.js"></script>
</body>
</html>
